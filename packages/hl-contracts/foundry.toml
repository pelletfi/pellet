[profile.default]
src = "src"
out = "out"
libs = ["lib"]
test = "test"
script = "script"
solc_version = "0.8.28"
optimizer = true
optimizer_runs = 200
via_ir = false

[rpc_endpoints]
hyperevm_testnet = "https://rpc.hyperliquid-testnet.xyz/evm"
hyperevm_mainnet = "https://rpc.hyperliquid.xyz/evm"

[etherscan]
# HyperScan (Blockscout) — no API key required, but forge requires the `key`
# field to exist so we pass a dummy string. Verify with:
#   forge verify-contract \
#     --verifier blockscout \
#     --verifier-url https://www.hyperscan.com/api/ \
#     --chain 999 <address> src/Foo.sol:Foo
hyperliquid = { url = "https://www.hyperscan.com/api/", chain = 999, key = "unused" }

[fmt]
line_length = 120
tab_width = 4
bracket_spacing = true
int_types = "long"
multiline_func_header = "params_first"
quote_style = "double"
number_underscore = "preserve"

[fuzz]
runs = 1000
max_test_rejects = 65536

[invariant]
runs = 256
depth = 15
fail_on_revert = false
