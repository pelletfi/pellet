<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>aureoline specimen</title>
<style>
  * { margin: 0; padding: 0; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #bcbcbc; }
  canvas { display: block; width: 100vw; height: 100vh; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const canvas = document.getElementById('c');
const gl = canvas.getContext('webgl2', { antialias: true, alpha: false });

const vsrc = `#version 300 es
in vec2 a_pos;
void main() { gl_Position = vec4(a_pos, 0.0, 1.0); }
`;

const fsrc = `#version 300 es
precision highp float;

uniform vec3 iResolution;
uniform float iTime;
uniform vec4 iMouse;
uniform float uScroll;

out vec4 fragColor;

const float TAU = 6.2831853;

vec2 smin(float a, float b, float k) {
    k *= 6.0;
    float h = max(k - abs(a - b), 0.0) / k;
    float m = h * h * h * 0.5;
    float s = m * k / 3.0;
    return a < b ? vec2(a - s, m) : vec2(b - s, 1.0 - m);
}

float sdRect(vec2 p, vec2 sz) {
    vec2 d = abs(p) - sz;
    return length(max(d, 0.0)) + min(max(d.x, d.y), 0.0);
}

void main() {
    vec2 p = (2.0 * gl_FragCoord.xy - iResolution.xy) / iResolution.y;
    vec2 m = (2.0 * iMouse.xy - iResolution.xy) / iResolution.y;

    float t = iTime * 0.18 + uScroll * 0.4;
    float k = 0.06;

    // --- scalar field: smin'd blobs ---
    // central mass
    float field = length(p) - 0.28;

    // orbiting satellites at different speeds, radii, phases
    vec2 c1 = vec2(cos(t * 0.71) * 0.42, sin(t * 0.93) * 0.36);
    field = smin(field, length(p - c1) - 0.14, k).x;

    vec2 c2 = vec2(cos(t * 0.53 + 2.1) * 0.55, sin(t * 0.62 + 1.0) * 0.44);
    field = smin(field, length(p - c2) - 0.11, k).x;

    vec2 c3 = vec2(cos(t * 0.87 + 4.2) * 0.38, sin(t * 0.41 + 3.3) * 0.52);
    field = smin(field, length(p - c3) - 0.16, k).x;

    vec2 c4 = vec2(cos(t * 0.34 + 1.7) * 0.60, sin(t * 0.78 + 5.1) * 0.32);
    field = smin(field, length(p - c4) - 0.09, k).x;

    vec2 c5 = vec2(cos(t * 0.62 + 3.8) * 0.30, sin(t * 1.05 + 0.5) * 0.58);
    field = smin(field, length(p - c5) - 0.12, k).x;

    // smaller fast-moving fragments
    vec2 c6 = vec2(cos(t * 1.3 + 0.9) * 0.48, sin(t * 1.1 + 2.7) * 0.46);
    field = smin(field, length(p - c6) - 0.06, k * 0.7).x;

    vec2 c7 = vec2(cos(t * 0.95 + 5.5) * 0.52, sin(t * 0.72 + 4.0) * 0.50);
    field = smin(field, length(p - c7) - 0.07, k * 0.7).x;

    // --- crosshair melts into the field ---
    float sH = sdRect(p - vec2(0.0, m.y), vec2(2.0, 0.003));
    field = smin(field, sH, 0.05).x;
    float sV = sdRect(p - vec2(m.x, 0.0), vec2(0.003, 1.2));
    field = smin(field, sV, 0.05).x;

    // --- contour lines from the unified field ---
    float spacing = 0.045;
    float lineW = 0.0025;
    float sd = 1e6;
    for (float i = -4.0; i <= 12.0; i += 1.0) {
        sd = min(sd, abs(field - i * spacing) - lineW);
    }

    // --- render ---
    vec3 bg = vec3(0.768);
    vec3 line = vec3(0.1);
    float aa = max(fwidth(sd), 1e-4);
    float amt = 1.0 - smoothstep(-aa, aa, sd);

    // fade outer contours
    float fade = smoothstep(0.7, 0.0, field);
    amt *= fade;

    vec3 col = mix(bg, line, amt);
    fragColor = vec4(col, 1.0);
}
`;

function compile(type, src) {
    const s = gl.createShader(type);
    gl.shaderSource(s, src);
    gl.compileShader(s);
    if (!gl.getShaderParameter(s, gl.COMPILE_STATUS)) {
        console.error(gl.getShaderInfoLog(s));
        gl.deleteShader(s);
        return null;
    }
    return s;
}

const prog = gl.createProgram();
gl.attachShader(prog, compile(gl.VERTEX_SHADER, vsrc));
gl.attachShader(prog, compile(gl.FRAGMENT_SHADER, fsrc));
gl.linkProgram(prog);
gl.useProgram(prog);

const vao = gl.createVertexArray();
gl.bindVertexArray(vao);
const buf = gl.createBuffer();
gl.bindBuffer(gl.ARRAY_BUFFER, buf);
gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1, 3,-1, -1,3]), gl.STATIC_DRAW);
const loc = gl.getAttribLocation(prog, 'a_pos');
gl.enableVertexAttribArray(loc);
gl.vertexAttribPointer(loc, 2, gl.FLOAT, false, 0, 0);

const uRes = gl.getUniformLocation(prog, 'iResolution');
const uTime = gl.getUniformLocation(prog, 'iTime');
const uMouse = gl.getUniformLocation(prog, 'iMouse');
const uScroll = gl.getUniformLocation(prog, 'uScroll');

const dpr = () => Math.min(devicePixelRatio || 1, 2);
function resize() {
    const w = Math.floor(innerWidth * dpr());
    const h = Math.floor(innerHeight * dpr());
    if (canvas.width !== w || canvas.height !== h) {
        canvas.width = w;
        canvas.height = h;
    }
    gl.viewport(0, 0, canvas.width, canvas.height);
}

const mouse = { x: innerWidth / 2 * dpr(), y: innerHeight / 2 * dpr(), tx: 0, ty: 0, init: false };
window.addEventListener('mousemove', e => {
    mouse.tx = e.clientX * dpr();
    mouse.ty = (innerHeight - e.clientY) * dpr();
    if (!mouse.init) { mouse.x = mouse.tx; mouse.y = mouse.ty; mouse.init = true; }
});

const scroll = { vel: 0, offset: 0 };
window.addEventListener('wheel', e => {
    scroll.vel += e.deltaY * 0.002;
    scroll.vel = Math.max(-8, Math.min(8, scroll.vel));
}, { passive: true });

resize();
window.addEventListener('resize', resize);

const t0 = performance.now();
let last = t0;

(function loop() {
    const now = performance.now();
    const dt = (now - last) / 1000;
    last = now;

    const lerp = 1 - Math.exp(-dt / 0.12);
    mouse.x += (mouse.tx - mouse.x) * lerp;
    mouse.y += (mouse.ty - mouse.y) * lerp;

    scroll.vel *= 1 - (1 - Math.exp(-dt / 0.6));
    scroll.offset += scroll.vel * dt;

    gl.uniform3f(uRes, canvas.width, canvas.height, 1);
    gl.uniform1f(uTime, (now - t0) / 1000);
    gl.uniform4f(uMouse, mouse.x, mouse.y, 0, 0);
    gl.uniform1f(uScroll, scroll.offset);
    gl.drawArrays(gl.TRIANGLES, 0, 3);
    requestAnimationFrame(loop);
})();
</script>
</body>
</html>
